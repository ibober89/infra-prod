- import_playbook: /opt/velveta/infra-prod/playbooks/bootstrap.yml

- name: Converge the Velveta prod server baseline
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    velveta_db_root_password: "{{ lookup('password', velveta_db.root_password_file + ' length=32 chars=ascii_letters,digits') }}"
    velveta_site_admin_password: "{{ lookup('password', velveta_db.admin_password_file + ' length=32 chars=ascii_letters,digits') }}"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

  tasks:
    - name: Ensure baseline OS packages are installed
      ansible.builtin.apt:
        name:
          - git
          - curl
          - rsync
          - acl
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure admin user exists
      ansible.builtin.user:
        name: "{{ velveta_users.admin }}"
        shell: /bin/bash
        state: present

    - name: Ensure frontend user exists
      ansible.builtin.user:
        name: "{{ velveta_users.frontend_dev }}"
        shell: /bin/bash
        groups:
          - docker
        append: true
        state: present

    - name: Ensure ERP dev user exists
      ansible.builtin.user:
        name: "{{ velveta_users.erp_dev }}"
        shell: /bin/bash
        groups:
          - docker
        append: true
        state: present

    - name: Ensure runner user exists
      ansible.builtin.user:
        name: "{{ velveta_users.runner }}"
        shell: /bin/bash
        groups:
          - docker
          - "{{ velveta_users.frontend_dev }}"
          - "{{ velveta_users.erp_dev }}"
        append: true
        state: present

    - name: Ensure prod project directories use the current ownership model
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
      loop:
        - path: "{{ velveta_paths.prod_root }}"
          owner: root
          group: root
          mode: "0755"
        - path: "{{ velveta_paths.prod_frappe_root }}"
          owner: "{{ velveta_users.erp_dev }}"
          group: "{{ velveta_users.erp_dev }}"
          mode: "0755"
        - path: "{{ velveta_paths.prod_nextjs_root }}"
          owner: "{{ velveta_users.frontend_dev }}"
          group: "{{ velveta_users.frontend_dev }}"
          mode: "2775"
        - path: "{{ velveta_paths.nginx_root }}"
          owner: "{{ velveta_users.admin }}"
          group: "{{ velveta_users.admin }}"
          mode: "0755"
        - path: "{{ velveta_paths.runner_frontendx_root }}"
          owner: "{{ velveta_users.runner }}"
          group: "{{ velveta_users.runner }}"
          mode: "0755"
        - path: "{{ velveta_paths.backups_root }}"
          owner: root
          group: root
          mode: "0755"

    - name: Deploy Docker installer helper
      ansible.builtin.copy:
        src: "{{ velveta_paths.infra_root }}/scripts/install-docker.sh"
        dest: "{{ velveta_paths.infra_root }}/scripts/install-docker.sh"
        mode: "0755"

    - name: Deploy backup script
      ansible.builtin.template:
        src: "{{ velveta_paths.infra_root }}/templates/backup-all.sh.j2"
        dest: "{{ velveta_paths.infra_root }}/scripts/backup-all.sh"
        mode: "0700"

    - name: Deploy backup systemd service
      ansible.builtin.template:
        src: "{{ velveta_paths.infra_root }}/templates/velveta-backup.service.j2"
        dest: /etc/systemd/system/velveta-backup.service
        mode: "0644"
      notify: Reload systemd

    - name: Deploy backup systemd timer
      ansible.builtin.template:
        src: "{{ velveta_paths.infra_root }}/templates/velveta-backup.timer.j2"
        dest: /etc/systemd/system/velveta-backup.timer
        mode: "0644"
      notify: Reload systemd

    - name: Check whether runner service executables exist
      ansible.builtin.stat:
        path: "{{ item.working_directory }}/runsvc.sh"
      loop:
        - name: actions.runner.ibober89-frontendX.vm519642-frontendx.service
          description: GitHub Actions Runner (ibober89-frontendX.vm519642-frontendx)
          working_directory: /opt/actions-runner-frontendx
      register: velveta_runner_execs

    - name: Deploy runner systemd service units when runner files exist
      ansible.builtin.template:
        src: "{{ velveta_paths.infra_root }}/templates/actions-runner.service.j2"
        dest: "/etc/systemd/system/{{ item.item.name }}"
        mode: "0644"
      loop: "{{ velveta_runner_execs.results }}"
      when: item.stat.exists
      notify: Reload systemd

    - name: Flush systemd handlers before enabling units
      ansible.builtin.meta: flush_handlers

    - name: Enable backup timer
      ansible.builtin.systemd:
        name: velveta-backup.timer
        enabled: true
        state: started

    - name: Ensure runner services stay enabled when present
      ansible.builtin.systemd:
        name: "{{ item.item.name }}"
        enabled: true
        state: started
      loop: "{{ velveta_runner_execs.results }}"
      when: item.stat.exists

    - name: Ensure git safe directories are configured for prod repos
      become_user: "{{ item.user }}"
      ansible.builtin.shell: |
        git config --global --get-all safe.directory | grep -Fx "{{ item.path }}" >/dev/null || \
        git config --global --add safe.directory "{{ item.path }}"
      args:
        executable: /bin/bash
      loop:
        - user: root
          path: /opt/velveta/prod/nextjs
        - user: github-runner
          path: /opt/velveta/prod/nextjs
        - user: frontend
          path: /opt/velveta/prod/nextjs
      changed_when: false

    - name: Check whether the production frontend directory is already a git repo
      ansible.builtin.stat:
        path: "{{ velveta_paths.prod_nextjs_root }}/.git"
      register: velveta_frontend_git_dir

    - name: Reset the production frontend directory when it is not a git repo yet
      ansible.builtin.file:
        path: "{{ velveta_paths.prod_nextjs_root }}"
        state: absent
      when: not velveta_frontend_git_dir.stat.exists

    - name: Recreate the production frontend directory
      ansible.builtin.file:
        path: "{{ velveta_paths.prod_nextjs_root }}"
        state: directory
        owner: "{{ velveta_users.frontend_dev }}"
        group: "{{ velveta_users.frontend_dev }}"
        mode: "2775"
      when: not velveta_frontend_git_dir.stat.exists

    - name: Sync production frontend source
      ansible.builtin.git:
        repo: "{{ velveta_repos.frontend.url }}"
        dest: "{{ velveta_paths.prod_nextjs_root }}"
        version: "{{ velveta_repos.frontend.version }}"
        force: true
        update: true

    - name: Ensure prod helper scripts are executable
      ansible.builtin.file:
        path: "{{ item }}"
        mode: "0755"
      loop:
        - "{{ velveta_paths.infra_root }}/scripts/build-prod-frappe-image.sh"
        - "{{ velveta_paths.infra_root }}/scripts/init-fresh-prod.sh"

    - name: Build production Frappe image
      ansible.builtin.shell: "{{ velveta_paths.infra_root }}/scripts/build-prod-frappe-image.sh"
      args:
        executable: /bin/bash
      environment:
        APPS_JSON_PATH: "{{ velveta_paths.prod_frappe_root }}/apps.json"
        FRAPPE_IMAGE_ROOT: "{{ velveta_paths.prod_frappe_image_root }}"
        FRAPPE_IMAGE_TAG: "velveta-frappe-prod:16"
        FRAPPE_REPO_URL: "{{ velveta_repos.frappe.url }}"
        FRAPPE_REPO_BRANCH: "{{ velveta_repos.frappe.version }}"
      changed_when: true

    - name: Build production Next.js image
      ansible.builtin.shell: |
        cd {{ velveta_paths.prod_root }}
        docker build \
          -t velveta-nextjs-prod:latest \
          -f {{ velveta_paths.prod_root }}/Dockerfile.nextjs \
          {{ velveta_paths.prod_root }}
      args:
        executable: /bin/bash
      changed_when: true

    - name: Initialize fresh production Frappe site
      ansible.builtin.shell: "{{ velveta_paths.infra_root }}/scripts/init-fresh-prod.sh"
      args:
        executable: /bin/bash
      environment:
        PROD_ROOT: "{{ velveta_paths.prod_root }}"
        FRAPPE_COMPOSE_FILE: "{{ velveta_compose_targets.prod_frappe }}"
        SITE_NAME: "{{ velveta_sites.prod }}"
      changed_when: true

    - name: Stop production nginx before recreating the Next.js network
      ansible.builtin.shell: |
        cd {{ velveta_paths.nginx_root }}
        docker compose -f {{ velveta_compose_targets.nginx }} down || true
      args:
        executable: /bin/bash
      changed_when: true

    - name: Remove stale unmanaged nextjs network from previous manual runs
      ansible.builtin.shell: |
        if docker network inspect nextjs_default >/dev/null 2>&1; then
          current_label="$(docker network inspect -f '{{ "{{" }} index .Labels "com.docker.compose.network" {{ "}}" }}' nextjs_default)"
          if [ "${current_label}" != "default" ]; then
            docker network rm nextjs_default
          fi
        fi
      args:
        executable: /bin/bash
      changed_when: true

    - name: Start production Next.js stack
      ansible.builtin.shell: |
        cd {{ velveta_paths.prod_root }}
        docker compose -f {{ velveta_compose_targets.prod_nextjs }} up -d
      args:
        executable: /bin/bash
      changed_when: true

    - name: Start production nginx stack
      ansible.builtin.shell: |
        cd {{ velveta_paths.nginx_root }}
        docker compose -f {{ velveta_compose_targets.nginx }} up -d
      args:
        executable: /bin/bash
      changed_when: true

    - name: Verify production Frappe endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ velveta_ports.erp_prod }}"
        method: GET
        status_code:
          - 200
          - 301
          - 302
          - 303
          - 307
          - 308
      register: velveta_verify_frappe
      retries: 12
      delay: 10
      until: velveta_verify_frappe.status in [200, 301, 302, 303, 307, 308]

    - name: Verify production Next.js endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ velveta_ports.nextjs_prod }}"
        method: GET
        status_code:
          - 200
          - 301
          - 302
          - 303
          - 307
          - 308
      register: velveta_verify_nextjs
      retries: 12
      delay: 10
      until: velveta_verify_nextjs.status in [200, 301, 302, 303, 307, 308]
