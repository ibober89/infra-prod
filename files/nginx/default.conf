map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        add_header Content-Type text/plain;
        return 404 'Unknown host.';
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name erp.velvetacare.com;

    set $erp_prod_upstream frontend:8080;

    location / {
        proxy_pass http://$erp_prod_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    set $erp_prod_upstream frontend:8080;

    location / {
        proxy_pass http://$erp_prod_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host erp.velvetacare.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name velvetacare.com www.velvetacare.com;

    set $nextjs_prod_upstream nextjs-prod:3000;

    location / {
        proxy_pass http://$nextjs_prod_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 8082;
    listen [::]:8082;
    server_name _;

    set $nextjs_prod_upstream nextjs-prod:3000;

