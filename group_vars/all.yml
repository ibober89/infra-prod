velveta_root: /opt/velveta

velveta_users:
  admin: admin
  erp_dev: erpdev
  frontend_dev: frontend
  runner: github-runner

velveta_paths:
  prod_root: /opt/velveta/prod
  nginx_root: /opt/velveta/nginx
  infra_root: /opt/velveta/infra-prod
  backups_root: /opt/velveta/backups
  secrets_root: /opt/velveta/infra-prod/.secrets
  prod_frappe_root: /opt/velveta/prod/frappe
  prod_nextjs_root: /opt/velveta/prod/nextjs
  prod_frappe_env_file: /opt/velveta/prod/frappe/.env
  prod_frappe_runtime_env_file: /opt/velveta/prod/frappe/frappe.env
  prod_frappe_marker_file: /opt/velveta/prod/frappe/.fresh-bootstrap-complete
  prod_frappe_image_root: /opt/velveta/prod/frappe/image
  prod_nextjs_env_file: /opt/velveta/prod/nextjs/nextjs.env
  prod_nextjs_dockerfile: /opt/velveta/prod/nextjs/Dockerfile.nextjs
  prod_nextjs_dockerignore: /opt/velveta/prod/nextjs/.dockerignore
  runner_ecommerce_root: /opt/actions-runner-ecommerce
  runner_frontendx_root: /opt/actions-runner-frontendx

velveta_compose_targets:
  prod_frappe: /opt/velveta/prod/frappe/docker-compose.frappe.yml
  prod_nextjs: /opt/velveta/prod/nextjs/docker-compose.nextjs.yml
  nginx: /opt/velveta/nginx/docker-compose.yml

velveta_domains:
  erp_prod: erp.velvetacare.com
  nextjs_prod:
    - velvetacare.com
    - www.velvetacare.com

velveta_ports:
  erp_prod: 8080
  nextjs_prod: 8082

velveta_sites:
  prod: erp.velvetacare.com

velveta_db:
  root_password_file: /opt/velveta/infra-prod/.secrets/db_root_password
  admin_password_file: /opt/velveta/infra-prod/.secrets/site_admin_password

velveta_repos:
  frontend:
    url: https://github.com/ibober89/frontendX.git
    version: main
  ecommerce:
    url: https://github.com/ibober89/ecommerce.git
    version: main
  frappe:
    url: https://github.com/frappe/frappe
    version: version-16

velveta_nextjs:
  site_url: "https://{{ velveta_domains.nextjs_prod[0] }}"
  ecommerce_price_list: "B2C"
  erpnext_api_key: ""
  erpnext_api_secret: ""

velveta_frappe:
  letsencrypt_email: ""

velveta_backup:
  retention_days: 1
  timer_on_calendar: "*-*-* 03:30:00"
  latest_symlink: /opt/velveta/backups/latest

velveta_restore:
  backup_dir: /opt/velveta/backups/latest

velveta_runner:
  version: 2.328.0
  github_api_base: https://api.github.com
  github_pat_file: /opt/velveta/infra-prod/.secrets/github_runner_pat
  package_arch_map:
    x86_64: x64
    amd64: x64
    aarch64: arm64
    arm64: arm64

velveta_runner_services:
  - name: actions.runner.ibober89-ecommerce.vm519642-ecommerce.service
    description: GitHub Actions Runner (ibober89-ecommerce.vm519642-ecommerce)
    working_directory: /opt/actions-runner-ecommerce
    github_owner: ibober89
    github_repo: ecommerce
    runner_name: vm519642-ecommerce
    runner_labels: self-hosted,Linux,X64,prod,ecommerce
  - name: actions.runner.ibober89-frontendX.vm519642-frontendx.service
    description: GitHub Actions Runner (ibober89-frontendX.vm519642-frontendx)
    working_directory: /opt/actions-runner-frontendx
    github_owner: ibober89
    github_repo: frontendX
    runner_name: vm519642-frontendx
    runner_labels: self-hosted,Linux,X64,prod,frontendx
